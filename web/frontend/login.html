<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClassChat Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

<h1>Login</h1>

<div class="input-group">
<label>Enter username</label>
<input type="text" id="username" placeholder="Enter username">
</div>

<div class="input-group">
<label>Upload profile image</label>
<input type="file" id="profileImage" accept="image/*">
</div>

<div class="profile-preview">
<img id="preview" src="https://via.placeholder.com/120">
</div>

<button class="enter-btn">Enter Chat →</button>

</div>


<script>

// preview uploaded image
const imageInput = document.getElementById("profileImage");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", function(){

    const file = this.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        preview.src = e.target.result;
    }

    reader.readAsDataURL(file);

});


// login button
document.querySelector(".enter-btn").addEventListener("click", login);


// allow enter key login
document.getElementById("username")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        login();
    }

});


function login(){

    const username = document.getElementById("username").value.trim();

    if(!username){
        alert("Please enter username");
        return;
    }

    // store user data
    localStorage.setItem("username", username);
    localStorage.setItem("image", preview.src);

    // go to chat page
    window.location.href = "chat.html";

}

</script>

</body>
</html>
